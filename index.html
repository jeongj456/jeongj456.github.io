<!DOCTYPE html>

<html>
    <head>
        <title>Personal Project</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
        <link href='https://fonts.googleapis.com/css?family=Josefin Sans' rel='stylesheet'>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" media="screen and (max-width: 600px)" href="index_mobile.css">
        <link rel="stylesheet" media="screen and (min-width: 601px)" href="index.css">
    </head>

    <body>
        <div class="main">

            <div id="page-color">
                White
                <label class="switch">
                    <input type="checkbox" name="slider" id="slider">
                    <span class="slider round"></span>
                </label>
                Black
            </div>
            <script>
                document.getElementById("slider").addEventListener("change", switchColor);
                var unit = document.getElementById("slider");
                console.log(unit.value);
                function switchColor() {
                    if (unit == 'cm'){
                        // Get the value in the attribute of the given tag with the element 'heightt' (in this case, placeholder)
                        document.getElementById("heightt").placeholder = "in"; // Replaces the current placeholder
                        document.getElementById("weight").placeholder = "lbs";
                    }else{
                        document.getElementById("heightt").placeholder = "cm";
                        document.getElementById("weight").placeholder = "kg";
                    }
                }
            </script>

            <h>Welcome to my page!!</h>

        </div>
    </body>
</html>
